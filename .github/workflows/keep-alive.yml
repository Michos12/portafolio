name: Keep Render backend awake

# Pings the backend health endpoint so the free Render instance does not sleep
# after 15 min of inactivity (which causes a ~50s cold start on the next visit).
#
# Notes:
# - GitHub only runs scheduled workflows from the DEFAULT branch (main).
# - Scheduled runs can be delayed a few minutes under load — 10 min leaves margin.
# - GitHub disables scheduled workflows after 60 days of repo inactivity; any push
#   re-enables them.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          curl -fsS --max-time 90 --retry 3 --retry-delay 30 \
            https://portfolio-api-vut4.onrender.com/api/health
